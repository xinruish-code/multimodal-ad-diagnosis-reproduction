# ─────────────────────────────────────────────────────────────────────────────
# MDL-Net Configuration
# Paper: "3D Multimodal Fusion Network With Disease-Induced Joint Learning
#         for Early Alzheimer's Disease Diagnosis"
# ─────────────────────────────────────────────────────────────────────────────

model:
  name: MDL-Net
  backbone: 3DResNet18
  channels: [16, 32, 64, 128]        # residual layer output channels
  fusion_modules: [SAT, LAL, LSL]    # Multi-Fusion Joint Learning modules
  drl_iterations: 3                  # Disease-induced Region-aware Learning
  num_roi: 90                        # AAL brain regions
  num_classes: 2

data:
  modalities: [mwp1, wm, pet]        # GM, WM, PET
  input_shape: [96, 112, 96]         # D x H x W
  csv_label_col: Label
  tasks:
    - AD_CN
    - AD_MCI
    - MCI_CN

training:
  epochs: 40
  warmup_epochs: 10
  cross_validation: 10               # 10-fold stratified CV
  batch_size: 4                      # paper: 16; reduced to 4 due to P100 16 GB VRAM
  optimizer: Adam
  learning_rate: 1.0e-3
  weight_decay: 1.0e-3
  loss_function: CrossEntropyLoss
  label_smoothing: 0.2
  random_seed: 42
  num_workers: 4
  device: cuda

results:
  AD_CN:
    ACC: 88.5
    SEN: 77.6
    SPE: 93.3
    AUC: 96.1
    F1:  80.8
    PRE: 86.7
    folds_completed: 10
  AD_MCI:
    ACC: 78.3
    SEN: 60.6
    SPE: 87.5
    AUC: 85.3
    F1:  null
    PRE: null
    folds_completed: 10
  MCI_CN:
    ACC: 66.4
    SEN: 44.4
    SPE: 83.9
    AUC: 75.0
    F1:  null
    PRE: null
    folds_completed: 9    # HPC 48-hour limit reached on fold 10
    note: "9/10 folds completed due to HPC 48-hour time limit"

environment:
  cluster: USC CARC (Discovery)
  gpu: Tesla P100-PCIE-16GB
  code_path: /scratch1/xinruish/data_AD/MDL-Net-reproduce/
