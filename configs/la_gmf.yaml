# ─────────────────────────────────────────────────────────────────────────────
# LA-GMF Configuration
# Paper: "Interpretable Medical Deep Framework by Logits-Constraint Attention
#         Guiding Graph-Based Multi-Scale Fusion for Alzheimer's Disease Analysis"
# ─────────────────────────────────────────────────────────────────────────────

model:
  name: LA-GMF
  backbone: 3DResNet
  fusion_module: GMF              # Graph-Based Multi-Scale Fusion
  attention_module: LCA           # Logits-Constraint Attention
  topk: 16                        # top-k attention regions
  num_classes: 2

data:
  modalities: [mwp1]              # GM tissue maps only
  image_folder: mwp1
  input_shape: [64, 80, 64]       # D x H x W
  csv_label_col: Label
  tasks:
    - AD_CN
    - AD_MCI
    - MCI_CN

training:
  epochs: 100
  cross_validation: 5             # 5-fold stratified CV
  batch_size: 3
  optimizer: Adam
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  loss_function: CrossEntropyLoss + LCA constraint loss
  random_seed: 42
  num_workers: 0
  device: cuda

results:
  AD_CN:
    ACC: 84.7
    SEN: 68.1
    SPE: 92.1
    AUC: 93.9
    F1:  71.0
    PRE: 84.2
    folds_completed: 5
  AD_MCI:
    ACC: 74.9
    SEN: 44.3
    SPE: 90.9
    AUC: 83.0
    F1:  52.8
    PRE: 75.9
    folds_completed: 5
  MCI_CN:
    ACC: 63.7
    SEN: 47.7
    SPE: 77.3
    AUC: 68.8
    F1:  53.2
    PRE: 67.4
    folds_completed: 5

environment:
  cluster: USC CARC (Discovery)
  gpu: Tesla P100-PCIE-16GB
  code_path: /scratch1/xinruish/data_AD/LAGMF-reproduce/
