# ─────────────────────────────────────────────────────────────────────────────
# CGAN-C Configuration
# Paper: "A Coupled-GAN Architecture to Fuse MRI and PET Image Features
#         for Multi-Stage Classification of Alzheimer's Disease"
# ─────────────────────────────────────────────────────────────────────────────

model:
  name: CGAN-C
  architecture: CoupledGAN
  encoders:
    - MRIEncoder                   # 3D CNN encoder for sMRI
    - PETEncoder                   # 3D CNN encoder for PET
  latent_channels: 128
  base_channels: 16
  num_classes: 2

data:
  modalities: [mwp1, pet]          # sMRI (GM) + PET
  mri_folder: mwp1
  pet_folder: pet
  input_shape: [64, 80, 64]        # D x H x W
  csv_label_col: Label
  tasks:
    - AD_CN
    - AD_MCI
    - MCI_CN

training:
  gan_epochs: 20
  clf_epochs: 20                   # default; we used clf-epochs 30 at submission
  cross_validation: 5              # 5-fold stratified CV
  batch_size: 4                    # default: 2; increased to 4 at submission
  optimizer: Adam
  gan_lr: 2.0e-4
  clf_lr: 1.0e-4
  weight_decay: 1.0e-4
  alpha: 0.5                       # GAN vs classification loss balance
  critic_steps: 1
  generator_steps: 1
  loss_function: GAN loss (WGAN) + CrossEntropyLoss
  random_seed: 42
  num_workers: 0
  device: cuda

results:
  AD_CN:
    ACC: 88.7
    SEN: 87.0
    SPE: 89.5
    AUC: 94.3
    F1:  82.7
    PRE: 79.2
    folds_completed: 5
  AD_MCI:
    ACC: 72.7
    SEN: 79.5
    SPE: 69.1
    AUC: 82.1
    F1:  66.7
    PRE: 57.6
    folds_completed: 5
  MCI_CN:
    ACC: 65.6
    SEN: 54.7
    SPE: 74.9
    AUC: 69.6
    F1:  58.7
    PRE: 66.8
    folds_completed: 5

environment:
  cluster: USC CARC (Discovery)
  gpu: Tesla P100-PCIE-16GB
  code_path: /scratch1/xinruish/data_AD/CGANC-reproduce/
