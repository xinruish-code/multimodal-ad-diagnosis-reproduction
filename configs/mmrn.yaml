# ─────────────────────────────────────────────────────────────────────────────
# MMRN Configuration
# Paper: "Multi-Template Meta-Information Regularized Network for
#         Alzheimer's Disease Diagnosis Using Structural MRI"
# ─────────────────────────────────────────────────────────────────────────────

model:
  name: MMRN
  backbone: SiameseEncoder         # 8 conv layers, shared weights
  modules:
    - SSL                          # Multi-Template Self-Supervised Learning
    - WML                          # Weakly Supervised Meta-Information Learning (InfoGAN)
    - MIM                          # Mutual Information Minimisation (CLUB)
  num_templates: 12
  num_classes: 2

data:
  modalities: [mwp1]               # sMRI only
  image_folder: mwp1
  input_shape: [64, 80, 64]        # D x H x W
  meta_columns: [Age, Sex, "MMSE Total Score"]
  csv_label_col: Label
  tasks:
    - AD_CN
    - AD_MCI
    - MCI_CN

training:
  epochs: 100
  cross_validation: single_split   # 80/20 stratified split
  batch_size: 6
  optimizer: Adam
  learning_rate: 1.0e-4
  weight_decay: null               # not specified
  loss_function: CrossEntropyLoss + SSL contrastive + WML GAN + MIM CLUB
  loss_weights:
    ce: 1.0
    ssl: 0.5
    disc: 0.05
    gen: 0.05
    q: 0.2
    club: 0.0                      # disabled to prevent numerical explosion
    rec: 0.05
  random_seed: 42
  num_workers: 0
  device: cuda
  note: "CLUB weight set to 0.0 to stabilise training; original paper uses full InfoGAN-based MIM"

results:
  AD_CN:
    ACC: 88.5
    SEN: 73.6
    SPE: 95.1
    AUC: 94.4
    folds_completed: single_split
  AD_MCI:
    ACC: 78.6
    SEN: 52.8
    SPE: 92.0
    AUC: 81.9
    folds_completed: single_split
  MCI_CN:
    ACC: 59.0
    SEN: 53.6
    SPE: 63.6
    AUC: 63.6
    folds_completed: single_split
  note: "Original paper uses train-on-ADNI-1/test-on-ADNI-2&3; single 80/20 split used as approximation"

environment:
  cluster: USC CARC (Discovery)
  gpu: Tesla P100-PCIE-16GB
  code_path: /scratch1/xinruish/data_AD/MMRN-reproduce/
